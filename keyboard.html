<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url(img1.png.jpg);
            background-size: 200%;
            background-position: 1600px 
        }
        #form{
            border-radius: 15%;
            align-content: center;
            border: 2px solid #000;
            width: 250px;
            margin:100px auto 0 auto;
            padding: 25px;
            background-color: rgba(0,0,0,0.5);

        }

        p,input{
            font:25px;
        }

        input{
            width: 225px;
            border: 1px solid #000;
        }

    </style>
</head>
<body>
    <div id="form">
        <h1 id="h1">Keyboard Events</h1>
        <p>onkeydown</p>
        <input id="text" onkeydown="document.getElementById('form').style.background=this.value">
        <p>onkeyup</p>
        <input id="text" onkeyup="document.getElementById('form').style.background=this.value">
        <p>onkeypress</p>
        <input id="text" onkeypress="document.getElementById('form').style.background=this.value">
    </div>
    </div>

    </div>
   
</body>
</html>

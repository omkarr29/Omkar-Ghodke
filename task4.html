<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: yellow;
            border-radius: 50%;
        }
    </style>
</head>
<body>
   
   <div onmouseover="getChange1()" id="box" onmousedown="getChange2()" onmouseup="getChange3()" ></div>

   <script>
    let ele = document.getElementById("box")
    function getChange1(){
        ele.style.backgroundColor = "red";
        
    }

     function getChange2(){
        ele.style.backgroundColor = "blue";
        
    }
     function getChange3(){
        ele.style.backgroundColor = "green";
        
    }
   </script>

</body>
</html>
